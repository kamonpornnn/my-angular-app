
<div class="role-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>
        <mat-icon>admin_panel_settings</mat-icon>
        รายการ Role
      </mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <table mat-table [dataSource]="dataSource" class="mat-elevation-z0 full-width">
        <!-- ลำดับ Column -->
        <ng-container matColumnDef="index">
          <th mat-header-cell *matHeaderCellDef>ลำดับ</th>
          <td mat-cell *matCellDef="let element; let i = index">{{ i + 1 }}</td>
        </ng-container>

        <!-- ชื่อ Role Column -->
        <ng-container matColumnDef="role_name">
          <th mat-header-cell *matHeaderCellDef>ชื่อ Role</th>
          <td mat-cell *matCellDef="let element">{{ element.role_name }}</td>
        </ng-container>

        <!-- การจัดการ Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>การจัดการ</th>
          <td mat-cell *matCellDef="let element">
            <button mat-raised-button color="primary" (click)="editRole(element)">
              <mat-icon>edit</mat-icon> แก้ไข
            </button>
            <button mat-raised-button color="warn" (click)="deleteRole(element)" class="ml-8">
              <mat-icon>delete</mat-icon> ลบ
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        <!-- No Data Row -->
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell no-data" colspan="3">ไม่พบข้อมูล</td>
        </tr>
      </table>

      <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
    </mat-card-content>
  </mat-card>
</div>
