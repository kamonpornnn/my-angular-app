<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>
        <mat-icon class="login-icon">account_circle</mat-icon>
        <span>เข้าสู่ระบบ2</span>
      </mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>ชื่อผู้ใช้</mat-label>
          <input matInput formControlName="username" placeholder="กรอกชื่อผู้ใช้">
          <mat-icon matPrefix>person</mat-icon>
          <mat-error *ngIf="loginForm.get('username')?.hasError('required')">
            กรุณากรอกชื่อผู้ใช้
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>รหัสผ่าน</mat-label>
          <input matInput formControlName="password" 
                 [type]="hidePassword ? 'password' : 'text'" 
                 placeholder="กรอกรหัสผ่าน">
          <mat-icon matPrefix>lock</mat-icon>
          <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
            กรุณากรอกรหัสผ่าน
          </mat-error>
          <mat-error *ngIf="loginForm.get('password')?.hasError('minlength')">
            รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร
          </mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" 
                type="submit" 
                class="full-width login-btn"
                [disabled]="loginForm.invalid || isLoading">
          <mat-icon *ngIf="!isLoading">login</mat-icon>
          <span *ngIf="!isLoading">เข้าสู่ระบบ</span>
          <span *ngIf="isLoading">กำลังเข้าสู่ระบบ...</span>
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
