<mat-card class="minimal-card">
  <div class="card-head">
    <h3>Packages</h3>
    <div class="card-actions">
      <button mat-flat-button color="primary" routerLink="/packages/add">Add Package</button>
    </div>
  </div>

  <div class="card-body">
    <table mat-table [dataSource]="dataSource" class="table">

      <ng-container matColumnDef="package_id">
        <th mat-header-cell *matHeaderCellDef> ID </th>
        <td mat-cell *matCellDef="let e">{{e.package_id}}</td>
      </ng-container>

      <ng-container matColumnDef="package_name">
        <th mat-header-cell *matHeaderCellDef> Name </th>
        <td mat-cell *matCellDef="let e">{{e.package_name}}</td>
      </ng-container>

      <ng-container matColumnDef="total_sessions">
        <th mat-header-cell *matHeaderCellDef> Total </th>
        <td mat-cell *matCellDef="let e">{{e.total_sessions}}</td>
      </ng-container>

      <ng-container matColumnDef="remaining_sessions">
        <th mat-header-cell *matHeaderCellDef> Remaining </th>
        <td mat-cell *matCellDef="let e">{{e.remaining_sessions}}</td>
      </ng-container>

      <ng-container matColumnDef="price">
        <th mat-header-cell *matHeaderCellDef> Price </th>
        <td mat-cell *matCellDef="let e">{{e.price | currency:'THB'}}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef> Status </th>
        <td mat-cell *matCellDef="let e">{{e.status}}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
</mat-card>
