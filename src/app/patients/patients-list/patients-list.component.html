<div class="patients-list">
  <h2>รายการคนไข้</h2>
  <mat-card class="minimal-card mat-elevation-z2">
    <div class="card-head">
      <h3 class="card-title">รายการคนไข้</h3>
      <div class="card-actions">
        <mat-form-field appearance="standard" class="search-field">
          <mat-label>ค้นหา</mat-label>
          <input matInput (keyup)="applyFilter($any($event.target).value)" placeholder="ชื่อ, นามสกุล, บัตรประชาชน">
        </mat-form-field>
        <button mat-flat-button color="primary" routerLink="/patients/add">เพิ่มคนไข้</button>
      </div>
    </div>

    <div class="card-body">
      <table mat-table [dataSource]="dataSource" class="table" matSort>

        <ng-container matColumnDef="patient_id">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
          <td mat-cell *matCellDef="let e"> {{e.patient_id}} </td>
        </ng-container>

        <ng-container matColumnDef="first_name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> ชื่อ </th>
          <td mat-cell *matCellDef="let e"> {{e.first_name}} </td>
        </ng-container>

        <ng-container matColumnDef="last_name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> สกุล </th>
          <td mat-cell *matCellDef="let e"> {{e.last_name}} </td>
        </ng-container>

        <ng-container matColumnDef="age">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> อายุ </th>
          <td mat-cell *matCellDef="let e"> {{e.age}} </td>
        </ng-container>

        <ng-container matColumnDef="phone_number">
          <th mat-header-cell *matHeaderCellDef> โทรศัพท์ </th>
          <td mat-cell *matCellDef="let e"> {{e.phone_number}} </td>
        </ng-container>

        <ng-container matColumnDef="national_id">
          <th mat-header-cell *matHeaderCellDef> บัตรประชาชน </th>
          <td mat-cell *matCellDef="let e"> {{e.national_id}} </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <mat-paginator [pageSizeOptions]="[5,10,20]" showFirstLastButtons></mat-paginator>
    </div>
  </mat-card>

</div>
